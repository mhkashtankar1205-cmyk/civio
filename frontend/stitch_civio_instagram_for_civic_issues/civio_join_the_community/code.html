<body class="bg-black selection:bg-primary/30 min-h-screen flex flex-col items-center">
<!-- Top AppBar (Identity & Language) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-margin-mobile h-16 max-w-[600px]">
<div class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Civio</div>
<button class="flex items-center gap-1 px-3 py-1.5 rounded-full bg-surface-container-high border border-white/5 hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="language">language</span>
<span class="font-label-bold text-label-bold text-on-surface">EN</span>
<span class="material-symbols-outlined text-[16px] text-on-surface-variant" data-icon="expand_more">expand_more</span>
</button>
</header>
<!-- Main Registration Canvas -->
<main class="w-full max-w-[600px] mt-24 mb-12 px-margin-mobile flex-1 flex flex-col">
<!-- Welcome Hero -->
<div class="mb-stack-lg text-center">
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Empower your neighborhood. Start reporting today.</p>
</div>
<!-- Social Login (IG Style) -->
<div class="grid grid-cols-2 gap-stack-md mb-stack-lg">
<button class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-surface-container border border-white/10 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCFycfn4DI6B1ox3z4RLFKYzZwe-aVKGUM6Rq_9Fb_dEgeabyRDB8SoMe1ToxCxNoqMD9gHCL8GipYBVNy70TgDfwbRgcX4ruYYf0-rq8i1g83PTozYtjpSTFvSywEinQGUb8Dnqlt4NFdQt0RgHe92P_W03KSwEk67g1zrMdRdfcuxoBKwr9lQ2gPVeEsL32teIvSjMpXPd4u0pzE9fwAG-jqbt4oRE0KxsbGjF8KE_B7pJ63tRU9NfYZdhFGfH8ORlD220hVbq8"/>
<span class="font-label-bold text-label-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-surface-container border border-white/10 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<img alt="Apple" class="w-5 h-5 invert" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApjNLAxFbCvLLuPJAg9sabv2eXx3CqQ_F0v_r3knoVyt0NFkHmy4SVAEFPnuHBuDFxX2VI_ylhh-3tKNy1fgWd3gRbk9Ga1qT9JEGWhYDKQFfJQ9oDOYajxy0yl4MdLAizd74dT1OlLdD2m5O7TMQwLdX0pSUx0xY0oo7x9OxVZhVfmYhMiEoO12yla74rMwgleLMMQ__5yQxQ5-VMKYukdymUS9WbglsgCbJGpljeAAUkj1hM4lEITB6hQ6sIqHWGAaFwbeXTD3Q"/>
<span class="font-label-bold text-label-bold text-on-surface">Apple</span>
</button>
</div>
<div class="flex items-center gap-4 mb-stack-lg">
<div class="h-px flex-1 bg-white/5"></div>
<span class="font-label-bold text-label-bold text-on-surface-variant/50">OR EMAIL</span>
<div class="h-px flex-1 bg-white/5"></div>
</div>
<!-- Registration Form -->
<form class="space-y-stack-md">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">FULL NAME</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container border-none rounded-xl px-12 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/40 transition-all" placeholder="Alex Rivera" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
</div>
<!-- Username -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">USERNAME</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container border-none rounded-xl px-12 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/40 transition-all" placeholder="arivera_civic" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">EMAIL ADDRESS</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container border-none rounded-xl px-12 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/40 transition-all" placeholder="alex@example.com" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">PASSWORD</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container border-none rounded-xl px-12 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/40 transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Area with Map Pin -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1">YOUR AREA</label>
<div class="flex gap-2">
<div class="relative group flex-1">
<input class="w-full h-14 bg-surface-container border-none rounded-xl px-12 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/40 transition-all" placeholder="San Francisco, CA" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="map">map</span>
</div>
<button class="h-14 w-14 flex items-center justify-center rounded-xl bg-primary-container text-on-primary-container hover:bg-primary-container/80 transition-all active:scale-90" title="Use current location" type="button">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
</div>
<!-- T&C -->
<div class="pt-2 flex items-start gap-3">
<div class="mt-1">
<input class="w-5 h-5 rounded border-white/10 bg-surface-container text-primary focus:ring-primary focus:ring-offset-0" id="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                    I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Sign Up Button -->
<button class="w-full h-16 mt-stack-lg rounded-2xl primary-gradient text-on-primary-fixed font-headline-lg flex items-center justify-center gap-2 shadow-[0_8px_32px_rgba(81,73,212,0.3)] transition-all hover:shadow-[0_8px_40px_rgba(81,73,212,0.5)] hover:-translate-y-0.5 active:scale-95 active:translate-y-0" type="submit">
                Sign Up
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-12 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? <a class="font-label-bold text-primary hover:underline underline-offset-4" href="#">Sign In</a>
</p>
</div>
</main>
<!-- Visual Aesthetic Element: Floating Sphere (Decorative) -->
<div class="fixed -bottom-32 -left-32 w-64 h-64 bg-primary/20 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed -top-32 -right-32 w-64 h-64 bg-secondary/10 blur-[100px] rounded-full pointer-events-none -z-10"></div>
<!-- Micro-interaction Script -->
<script>
        // Form feedback and simple interactivity
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple Location Trigger Mock
        const locationBtn = document.querySelector('button[title="Use current location"]');
        locationBtn.addEventListener('click', () => {
            const icon = locationBtn.querySelector('.material-symbols-outlined');
            icon.style.animation = 'spin 1s linear infinite';
            
            // Mocking a delay
            setTimeout(() => {
                icon.style.animation = '';
                const areaInput = document.querySelector('input[placeholder="San Francisco, CA"]');
                areaInput.value = "New York, NY (Detected)";
                areaInput.classList.add('text-primary');
                setTimeout(() => areaInput.classList.remove('text-primary'), 1000);
            }, 1200);
        });
    </script>
<style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body></html>
