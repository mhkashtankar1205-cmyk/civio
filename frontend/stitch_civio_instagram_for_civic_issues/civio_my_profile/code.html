<script>
        function switchTab(tab) {
            const tabs = ['posts', 'supported', 'resolved'];
            const container = document.getElementById('grid-container');
            
            // Update UI state
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    el.classList.add('border-primary', 'text-primary');
                    el.classList.remove('border-transparent', 'text-on-surface-variant');
                } else {
                    el.classList.remove('border-primary', 'text-primary');
                    el.classList.add('border-transparent', 'text-on-surface-variant');
                }
            });

            // Generate Mock Content based on tab
            let html = '';
            const images = [
                "A dramatic nighttime city view with light trails on a highway.",
                "High-tech urban architecture with clean lines and reflective glass.",
                "Close up of a high-tech surveillance camera on a dark street lamp.",
                "A community meeting in a dimly lit, modern library space.",
                "A sleek electric car charging at a futuristic urban station.",
                "A bird's eye view of a geometric urban park at night.",
                "A close-up of a high-resolution public transit digital map.",
                "Minimalist street furniture in a plaza with cool lighting.",
                "Hand holding a high-end smartphone displaying a civic app map."
            ];

            for (let i = 0; i < 9; i++) {
                const isResolved = tab === 'resolved';
                html += `
                    <div class="aspect-square relative group overflow-hidden">
                        <img src="placeholder" data-alt="${images[i]} Premium ${tab} content for a civic engagement app with a high-contrast dark aesthetic." class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/20 group-active:bg-black/40 transition-colors"></div>
                        ${isResolved ? `
                            <div class="absolute top-2 right-2 bg-green-500/90 text-white rounded-full p-1 shadow-lg">
                                <span class="material-symbols-outlined text-[14px]" data-icon="check" data-weight="fill">check</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // Re-trigger any image injection scripts if this were a real system
            // In this static mock, we're just updating the HTML structure
        }
    </script>
